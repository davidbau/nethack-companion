<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Traveler's Companion to the Mazes of Menace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Source+Code+Pro:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav id="sidebar-toc" aria-label="Table of contents">
  <div class="sidebar-title">Contents</div>
  <ul id="sidebar-toc-list"></ul>
</nav>
<aside id="sidebar-search" aria-label="Search">
  <div class="sidebar-title">Search</div>
  <div class="search-wrapper">
    <input type="text" id="search-input" placeholder="Search the guide...">
    <button type="button" id="search-clear" aria-label="Clear search" hidden>×</button>
  </div>
  <div id="search-results"></div>
  <div id="search-index"></div>
</aside>
<main id="guide-content">
<a class="page-fold" href="#what-changed-since-last-time"
   aria-label="New: updated for NetHack 5.0">
  <span class="page-fold-text">New!<br>Updated for 5.0</span>
</a>
$body$
</main>
<script>
(function() {
  // --- Icons for sections that include a figure or are a useful reference ---
  // The light-brown background matches the inline-code background used
  // throughout the body text, making the TOC glyph read as a code-span.
  var glyph = function(s) {
    return '<span style="flex:none;margin-left:0.4em;font-family:var(--font-mono);font-size:0.85em;font-weight:600;color:#5a5a5a;background:#f5f0e8;padding:0.1em 0.35em;border-radius:3px;letter-spacing:-0.05em;">' + s + '</span>';
  };
  var sectionIcons = {
    'the-lay-of-the-land': '<span style="flex:none;margin-left:0.4em;background:#f5f0e8;color:#5a5a5a;padding:0.1em 0.3em;border-radius:3px;display:inline-flex;align-items:center;vertical-align:-2px;"><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.1" aria-hidden="true"><path d="M1 3 L5 2 L9 3.5 L13 2 L13 11 L9 12.5 L5 11 L1 12 Z"/><line x1="5" y1="2" x2="5" y2="11"/><line x1="9" y1="3.5" x2="9" y2="12.5"/></svg></span>',
    'a-practical-identification-strategy': '<span style="flex:none;margin-left:0.4em;background:#f5f0e8;color:#5a5a5a;padding:0.1em 0.3em;border-radius:3px;display:inline-flex;align-items:center;vertical-align:-2px;"><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.1" aria-hidden="true"><rect x="2" y="1" width="10" height="3"/><rect x="2" y="5" width="10" height="3"/><rect x="2" y="9" width="10" height="3"/><line x1="7" y1="4" x2="7" y2="5"/><line x1="7" y1="8" x2="7" y2="9"/></svg></span>',
    'provisions-and-dining': glyph('%'),
    'the-apothecary':     glyph('!'),
    'the-scroll-rack':    glyph('?'),
    'wands-and-staves':   glyph('/'),
    'rings-and-amulets':  glyph('= &quot;'),
    'tools-of-the-trade': glyph('('),
    'weapons-tables':     glyph(')'),
    'armor-tables':       glyph('['),
    'spell-tables':       glyph('+')
  };

  // --- Build TOC from headings ---
  var tocList = document.getElementById('sidebar-toc-list');
  var headings = document.querySelectorAll('main h2, main h3');
  var tocItems = [];

  headings.forEach(function(h) {
    var section = h.closest('section') || h.parentElement;
    var id = section.id || h.id;
    if (!id) return;

    var li = document.createElement('li');
    li.className = h.tagName === 'H2' ? 'toc-part' : 'toc-chapter';
    var a = document.createElement('a');
    a.href = '#' + id;
    var icon = sectionIcons[id];
    if (icon) {
      a.innerHTML = '<span>' + h.textContent.replace(/[<>&"]/g, function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];}) + '</span>' + icon;
    } else {
      a.textContent = h.textContent;
    }
    a.setAttribute('data-target', id);
    li.appendChild(a);
    tocList.appendChild(li);
    tocItems.push({ el: li, id: id, heading: h });
  });

  // --- Scroll tracking ---
  // Highlight the last section whose top is above 200px from viewport top.
  // This correctly picks subsections (h3) over their parent (h2) once
  // the subsection heading has scrolled into the upper portion of the page.
  var currentActive = null;
  var sections = [];
  tocItems.forEach(function(item) {
    var target = document.getElementById(item.id);
    if (target) sections.push({ id: item.id, el: target, tocItem: item.el });
  });

  var scrollTicking = false;
  function updateActiveSection() {
    scrollTicking = false;
    var scrollLine = 100;
    var best = null;
    for (var i = 0; i < sections.length; i++) {
      if (sections[i].el.getBoundingClientRect().top <= scrollLine) {
        best = sections[i];
      }
    }
    if (!best || best.tocItem === currentActive) return;

    if (currentActive) currentActive.classList.remove('active');
    best.tocItem.classList.add('active');
    currentActive = best.tocItem;

    if (history.replaceState) {
      history.replaceState(null, '', '#' + best.id);
    }

    var tocContainer = document.getElementById('sidebar-toc');
    var itemTop = best.tocItem.offsetTop;
    var containerHeight = tocContainer.clientHeight;
    var scrollTop = tocContainer.scrollTop;
    if (itemTop < scrollTop + 60 || itemTop > scrollTop + containerHeight - 40) {
      tocContainer.scrollTop = itemTop - containerHeight / 3;
    }
  }

  window.addEventListener('scroll', function() {
    if (!scrollTicking) {
      requestAnimationFrame(updateActiveSection);
      scrollTicking = true;
    }
  }, { passive: true });
  updateActiveSection();

  // --- Search ---
  var searchInput = document.getElementById('search-input');
  var searchResults = document.getElementById('search-results');
  var searchIndex = document.getElementById('search-index');

  // --- Stopwords skipped when normalizing hit position within a sentence ---
  var STOPWORDS = { 'the':1, 'a':1, 'an':1, 'of':1, 'to':1, 'and':1, 'or':1,
                    'in':1, 'on':1, 'at':1, 'for':1, 'is':1, 'are':1, 'as':1, 'by':1 };

  // Walk an element and produce its concatenated text together with
  // the character offset ranges of any bold (strong/b) spans within.
  function elTextAndBold(el) {
    var text = '';
    var ranges = [];
    function walk(node, inBold) {
      if (node.nodeType === 3) { text += node.nodeValue; return; }
      if (node.nodeType !== 1) return;
      var nowBold = inBold || node.tagName === 'STRONG' || node.tagName === 'B';
      if (nowBold && !inBold) {
        var start = text.length;
        for (var i = 0; i < node.childNodes.length; i++) walk(node.childNodes[i], true);
        ranges.push([start, text.length]);
      } else {
        for (var j = 0; j < node.childNodes.length; j++) walk(node.childNodes[j], nowBold);
      }
    }
    walk(el, false);
    return { text: text, boldRanges: ranges };
  }

  // Build searchable data from headings and paragraphs. Each section gets
  // a list of typed segments so the scorer can weight heading/bold/plain
  // differently. The flat `text` field is kept for snippet generation.
  var searchData = [];
  var contentSections = document.querySelectorAll('main section[id]');
  contentSections.forEach(function(section) {
    var heading = section.querySelector('h1, h2, h3, h4');
    if (!heading) return;
    var level = parseInt(heading.tagName.substring(1), 10);
    var segments = [{ kind: 'heading', level: level,
                      text: heading.textContent, boldRanges: [] }];
    // `flat` holds body-only text for snippet generation. The title is
    // already shown in the search result heading, so excluding it here
    // keeps the snippet from repeating it back.
    var flat = '';
    var textEls = section.querySelectorAll(':scope > p, :scope > ul > li, :scope > ol > li, :scope > pre, :scope > table td, :scope > blockquote p, :scope > div.dense-table table td, :scope > div > table td');
    textEls.forEach(function(el) {
      var info = elTextAndBold(el);
      var kind = (el.tagName === 'TD' || el.tagName === 'TH') ? 'cell' : 'plain';
      segments.push({ kind: kind, text: info.text, boldRanges: info.boldRanges });
      flat += info.text + ' ';
    });
    searchData.push({
      id: section.id,
      title: heading.textContent,
      level: level,
      text: flat.substring(0, 4000),
      segments: segments
    });
  });

  // --- Scoring helpers ---
  function isInBold(pos, ranges) {
    for (var i = 0; i < ranges.length; i++) {
      if (pos >= ranges[i][0] && pos < ranges[i][1]) return true;
    }
    return false;
  }
  // Scan backward; a hit is inside parentheses if we find an unmatched '('.
  function isInParens(text, pos) {
    var depth = 0;
    for (var j = pos - 1; j >= 0; j--) {
      var c = text.charCodeAt(j);
      if (c === 41) depth++;          // ')'
      else if (c === 40) {            // '('
        if (depth === 0) return true;
        depth--;
      }
    }
    return false;
  }
  // Find the [start, end) bounds of the sentence containing `pos`.
  function sentenceContaining(text, pos) {
    var start = 0;
    for (var j = pos; j > 0; j--) {
      var c = text.charCodeAt(j - 1);
      if (c === 46 || c === 33 || c === 63) {  // .!?
        start = j;
        while (start < text.length && /\s/.test(text[start])) start++;
        break;
      }
    }
    var end = text.length;
    for (var k = pos + 1; k < text.length; k++) {
      var cc = text.charCodeAt(k);
      if (cc === 46 || cc === 33 || cc === 63) { end = k; break; }
    }
    return { start: start, end: end };
  }
  // Skip a leading run of stopwords from the sentence (returns char count).
  function stopwordSkip(text, start, end) {
    var i = start;
    while (i < end) {
      while (i < end && !/[a-z]/i.test(text[i])) i++;
      if (i >= end) break;
      var wstart = i;
      while (i < end && /[a-z]/i.test(text[i])) i++;
      if (!STOPWORDS[text.substring(wstart, i).toLowerCase()]) return wstart - start;
    }
    return i - start;
  }

  // Score consecutive-bigram bonus for a multi-word query.
  // For every adjacent pair of query words, find occurrences of the
  // pair as a contiguous substring in any segment (treating runs of
  // whitespace as a single space) and award a per-occurrence bonus
  // proportional to the segment's kind weight. Skips pairs where both
  // words are stopwords so phrases like "in the" don't drown out real
  // content matches.
  function scoreBigramsInSection(item, words) {
    if (words.length < 2) return 0;
    var total = 0;
    for (var n = 0; n < words.length - 1; n++) {
      var w1 = words[n], w2 = words[n + 1];
      if (STOPWORDS[w1] && STOPWORDS[w2]) continue;
      var bigram = w1 + ' ' + w2;
      for (var s = 0; s < item.segments.length; s++) {
        var seg = item.segments[s];
        var normalized = seg.text.toLowerCase().replace(/\s+/g, ' ');
        var weight;
        if (seg.kind === 'heading') weight = 160 / Math.pow(2, seg.level - 1);
        else if (seg.kind === 'cell') weight = 3;
        else weight = 2;
        var i = 0;
        while ((i = normalized.indexOf(bigram, i)) !== -1) {
          total += weight;
          i += bigram.length;
        }
      }
    }
    return total;
  }

  // Score one section against a single (lowercase) query word.
  function scoreWordInSection(item, word) {
    var total = 0;
    for (var s = 0; s < item.segments.length; s++) {
      var seg = item.segments[s];
      var t = seg.text;
      var lt = t.toLowerCase();
      var i = 0;
      while ((i = lt.indexOf(word, i)) !== -1) {
        var weight;
        if (seg.kind === 'heading') {
          // h2=80, h3=40, h4=20, h5=10 — higher in the hierarchy weighs more.
          weight = 160 / Math.pow(2, seg.level - 1);
        } else if (seg.kind === 'cell') {
          weight = 3;
        } else {
          weight = isInBold(i, seg.boldRanges) ? 6 : 1;
        }
        if (seg.kind !== 'heading' && isInParens(t, i)) weight *= 0.6;
        // Position bonus: 1.0 at sentence start (after stopwords), 0 at end.
        var sent = sentenceContaining(t, i);
        var skip = stopwordSkip(t, sent.start, sent.end);
        var effPos = Math.max(0, (i - sent.start) - skip);
        var effLen = Math.max(1, (sent.end - sent.start) - skip);
        var posBonus = Math.max(0, 1 - effPos / effLen);
        total += weight * (0.5 + posBonus);
        i += word.length;
      }
    }
    return total;
  }

  var searchClear = document.getElementById('search-clear');
  function updateClearButton() {
    searchClear.hidden = searchInput.value.length === 0;
  }
  var searchTimeout = null;
  searchInput.addEventListener('input', function() {
    updateClearButton();
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(doSearch, 200);
  });
  searchClear.addEventListener('click', function() {
    searchInput.value = '';
    updateClearButton();
    searchInput.focus();
    doSearch();
  });

  // Title-match bonus: if the query covers the content-bearing words of
  // the section's title, that section is almost certainly the intended
  // hit. Without this, a section title-matching the query can lose to a
  // distant section that mentions the query many times in passing (e.g.
  // a search for "Quest" lost to the Bestiary section listing every
  // role's "quest leader" / "quest nemesis").
  function titleMatchBonus(title, word) {
    var contentWords = title.toLowerCase().split(/\s+/).map(function(w) {
      return w.replace(/[^a-z0-9]/g, '');
    }).filter(function(w) { return w && !STOPWORDS[w]; });
    if (contentWords.length === 0) return 0;
    var matches = 0;
    for (var i = 0; i < contentWords.length; i++) {
      if (contentWords[i] === word) matches++;
    }
    if (matches === 0) return 0;
    // Scale 0-50 by title coverage. 1.0 coverage (single-word title equals
    // the query) is worth ~50 plain-text mentions.
    return 50 * matches / contentWords.length;
  }

  function doSearch() {
    var query = searchInput.value.trim().toLowerCase();
    if (query.length < 2) {
      searchResults.innerHTML = '';
      searchResults.style.display = 'none';
      searchIndex.style.display = '';
      return;
    }
    searchIndex.style.display = 'none';
    searchResults.style.display = '';

    var words = query.split(/\s+/);
    var matches = [];
    searchData.forEach(function(item) {
      var haystack = (item.title + ' ' + item.text).toLowerCase();
      var score = 0;
      var allMatch = true;
      for (var w = 0; w < words.length; w++) {
        if (haystack.indexOf(words[w]) === -1) { allMatch = false; break; }
        score += scoreWordInSection(item, words[w]);
        score += titleMatchBonus(item.title, words[w]);
      }
      if (allMatch) score += scoreBigramsInSection(item, words);
      if (allMatch && score > 0) matches.push({ item: item, score: score });
    });

    matches.sort(function(a, b) { return b.score - a.score; });

    if (matches.length === 0) {
      searchResults.innerHTML = '<div class="search-empty">No results found.<br><span class="search-hint">The dungeon keeps its secrets.</span></div>';
      return;
    }

    var html = '';
    var shown = Math.min(matches.length, 15);
    for (var i = 0; i < shown; i++) {
      var m = matches[i].item;
      // Find a snippet containing the query
      var snippet = getSnippet(m.text, words[0]);
      html += '<a class="search-result" href="#' + m.id + '">';
      html += '<span class="search-result-title">' + highlightMatches(m.title, words) + '</span>';
      if (snippet) html += '<span class="search-result-snippet">' + highlightMatches(snippet, words) + '</span>';
      html += '</a>';
    }
    if (matches.length > shown) {
      html += '<div class="search-more">' + (matches.length - shown) + ' more results...</div>';
    }
    searchResults.innerHTML = html;

    // Add click handlers to highlight search terms in the target section
    var resultLinks = searchResults.querySelectorAll('.search-result');
    resultLinks.forEach(function(link) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        var targetId = this.getAttribute('href').substring(1);
        highlightSearchTermInSection(targetId, words);
      });
    });
  }

  function highlightSearchTermInSection(sectionId, words) {
    // Clear any previous highlights
    document.querySelectorAll('.search-highlight').forEach(function(el) {
      var text = el.textContent;
      el.replaceWith(document.createTextNode(text));
    });

    // Find the target section
    var section = document.getElementById(sectionId);
    if (!section) return;

    // Navigate to the section first
    window.location.hash = sectionId;

    // Find the first occurrence of any search word in the section's text
    var walker = document.createTreeWalker(
      section,
      NodeFilter.SHOW_TEXT,
      {
        acceptNode: function(node) {
          // Skip script tags, style tags, and sidebar elements
          var parent = node.parentElement;
          if (!parent) return NodeFilter.FILTER_REJECT;
          var tag = parent.tagName.toLowerCase();
          if (tag === 'script' || tag === 'style') return NodeFilter.FILTER_REJECT;
          if (parent.closest('#sidebar-toc') || parent.closest('#sidebar-search')) {
            return NodeFilter.FILTER_REJECT;
          }
          return NodeFilter.FILTER_ACCEPT;
        }
      }
    );

    var firstMatch = null;
    var matchedWord = null;

    // Walk through all text nodes to find the first match
    while (walker.nextNode()) {
      var textNode = walker.currentNode;
      var text = textNode.textContent;
      var lowerText = text.toLowerCase();

      for (var i = 0; i < words.length; i++) {
        var word = words[i].toLowerCase();
        var idx = lowerText.indexOf(word);
        if (idx !== -1) {
          firstMatch = textNode;
          matchedWord = word;
          break;
        }
      }
      if (firstMatch) break;
    }

    if (firstMatch && matchedWord) {
      // Split the text node and wrap the match in a highlight span
      var text = firstMatch.textContent;
      var lowerText = text.toLowerCase();
      var idx = lowerText.indexOf(matchedWord);

      if (idx !== -1) {
        var before = text.substring(0, idx);
        var match = text.substring(idx, idx + matchedWord.length);
        var after = text.substring(idx + matchedWord.length);

        var beforeNode = document.createTextNode(before);
        var highlightSpan = document.createElement('span');
        highlightSpan.className = 'search-highlight';
        highlightSpan.textContent = match;
        var afterNode = document.createTextNode(after);

        var parent = firstMatch.parentNode;
        parent.insertBefore(beforeNode, firstMatch);
        parent.insertBefore(highlightSpan, firstMatch);
        parent.insertBefore(afterNode, firstMatch);
        parent.removeChild(firstMatch);

        // Scroll to highlight only if it's in the lower portion of viewport
        // (don't scroll up - keep section header at top)
        setTimeout(function() {
          var rect = highlightSpan.getBoundingClientRect();
          var viewportHeight = window.innerHeight;
          var scrollThreshold = viewportHeight * 0.6; // 60% down the page

          // Only scroll if the highlight is below the comfortable reading area
          if (rect.top > scrollThreshold) {
            highlightSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
          // If highlight is in top 60% or above, don't scroll - it's visible
        }, 100);
      }
    }
  }

  function getSnippet(text, word) {
    var idx = text.toLowerCase().indexOf(word);
    if (idx === -1) return '';
    var start = Math.max(0, idx - 40);
    var end = Math.min(text.length, idx + word.length + 60);
    var s = text.substring(start, end).replace(/\s+/g, ' ').trim();
    if (start > 0) s = '\u2026' + s;
    if (end < text.length) s = s + '\u2026';
    return s;
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function highlightMatches(text, words) {
    var safe = escHtml(text);
    // Build a regex matching any of the search words (longest first to avoid partial overlap)
    var sorted = words.slice().sort(function(a, b) { return b.length - a.length; });
    var reChars = /[.*+?^$${}()|[\]\\]/g;
    var escaped = sorted.map(function(w) { return escHtml(w).replace(reChars, '\\$$&'); });
    var re = new RegExp('(' + escaped.join('|') + ')', 'gi');
    return safe.replace(re, '<b>$$1</b>');
  }

  // --- Humorous index (shown when search is empty) ---
  var indexEntries = [
    ['Amorous demon, expensive evening with', 'seduction'],
    ['Amulet of Yendor, retrieving', 'the-ascension-run'],
    ['Ascension, how to not die during', 'the-ascension-run'],
    ['Boulders, pushing (see: Sokoban)', 'sokoban-solutions'],
    ['BUC, avoiding curses by checking', 'blessed-uncursed-cursed-buc'],
    ['Castle, storming the', 'the-castle'],
    ['Cockatrice corpse, wielding', 'petrification-stoning'],
    ['Death, causes of (see: everything)', 'things-that-will-kill-you'],
    ['Disenchanter, mourning your former +5', 'enchantment-drain'],
    ['Displacer beast, taming', 'the-displacer-beast'],
    ['Drowning, preventable', 'drowning'],
    ['Elbereth, writing frantically', 'engravings'],
    ['Floating eye, do not hit', 'eyes-and-spheres-e'],
    ['Food, running out of', 'how-hunger-works'],
    ['Gehennom, why is it so hot', 'gehennom'],
    ['Gods, angering', 'altars-and-alignment'],
    ['Identify, never enough scrolls of', 'the-scroll-rack'],
    ['Luck, secretly ruining yours', 'gaining-and-losing-luck'],
    ['Lurker above, looking up too late', 'engulfment'],
    ['Mines, gnomish', 'the-gnomish-mines'],
    ['Pet, accidentally killing your', 'keeping-your-pet-alive'],
    ['Prayer, when to', 'prayer'],
    ['Shopkeeper, angering', 'shopping-and-shopkeeper-pricing'],
    ['Sokoban, solving without cheating', 'sokoban-solutions'],
    ['Stoning, avoiding', 'petrification-stoning'],
    ['Tourists, playing as', 'choosing-your-expedition'],
    ['Unicorn horn, no longer a cure-all', 'what-changed-since-last-time'],
    ['Vlad&rsquo;s throne, fourth sit&rsquo;s the charm', 'vlads-tower'],
    ['Wand, identifying by engraving', 'identification-by-engraving'],
    ['Wand of wishing, found with one charge', 'the-castle'],
    ['Wishes, optimal use of', 'what-to-wish-for'],
    ['YASD, inevitability of', 'your-first-descent'],
  ];

  var indexHtml = '<div class="humorous-index"><div class="index-title">Index of Useful Knowledge</div>';
  indexEntries.forEach(function(entry) {
    indexHtml += '<a class="index-entry" href="#' + entry[1] + '">' + entry[0] + '</a>';
  });
  indexHtml += '</div>';
  searchIndex.innerHTML = indexHtml;
})();
</script>
</body>
</html>
